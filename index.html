<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mirramor - نظام البيع v2</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:system-ui,'Cairo',sans-serif;background:#fff5f8;color:#111;-webkit-text-size-adjust:100%}
.wrap{padding:10px;max-width:480px;margin:auto}
header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:12px 14px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);position:sticky;top:10px;z-index:10}
.logo{display:flex;gap:8px;align-items:center}
.logo .m{width:36px;height:36px;border-radius:10px;background:#111;color:#fff;display:grid;place-items:center;font-weight:900}
h1{margin:0;font-size:20px}
.top2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.card{background:#fff;border-radius:14px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid #f0f0f0}
label{font-size:11px;color:#777;font-weight:700;display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:10px;border:1px solid #e5e5e5;border-radius:10px;background:#fafafa;font-size:15px}
input:focus{outline:2px solid #d81b60;background:#fff}
.controls{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:800;font-size:13px}
.btn-dark{background:#111;color:#fff}
.btn-pink{background:#d81b60;color:#fff}
.btn-light{background:#eee}
.products{max-height:48vh;overflow:auto;padding-bottom:60px}
.prod{background:#fff;border:1px solid #f0e0e6;border-radius:12px;padding:8px;margin-bottom:8px}
.prod-top{display:flex;justify-content:space-between;align-items:center}
.pname{font-weight:800;font-size:14px}
.pen{font-size:10px;color:#999}
.del{background:#ffe4ea;color:#c00;border:none;width:28px;height:28px;border-radius:8px}
.prod-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}
.small{font-size:10px;color:#777;text-align:center}
.qty{display:flex}
.qty button{width:32px;height:38px;border:1px solid #ddd;background:#f9f9f9;border-radius:8px;font-size:18px}
.qty input{text-align:center;font-weight:700;border-left:none;border-right:none;border-radius:0}
.sub{font-weight:900;text-align:center;font-size:15px;color:#d81b60;padding-top:18px}
.summary{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px;box-shadow:0 -4px 20px rgba(0,0,0,.08);max-width:480px;margin:auto;border-radius:16px 16px 0 0}
.sum-row{display:flex;justify-content:space-between;font-size:13px;margin:2px 0}
.total{font-size:22px;font-weight:900;color:#d81b60}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.actions .btn{padding:9px;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:10px;z-index:99}
.modal.show{display:flex}
.paper{background:#fff;width:100%;max-width:420px;border-radius:16px;max-height:90vh;overflow:auto}
</style>

</head>
<body>
<div class="wrap">
<header class="no-print"><div class="logo"><div class="m">m</div><div><h1>mirramor</h1><div style="font-size:11px;color:#777">نظام البيع المتطور</div></div></div><div style="font-size:12px;background:#f3f3f3;padding:6px 10px;border-radius:999px">جاهز</div></header>

<div class="top2 no-print">
  <div class="card"><label>اسم العميل</label><input id="cust" placeholder="اسم العميل"></div>
  <div class="card"><label>التاريخ</label><input id="date" type="date"></div>
</div>

<div class="">
 <div class="card no-print">
   <div class="controls">
     <div style="display:flex;gap:4px;align-items:center;flex:1">
       <input id="gdisc" type="number" min="0" max="100" placeholder="50" value="50" style="width:65px;text-align:center;padding:8px">
       <span style="font-weight:700;font-size:13px">% خصم للكل</span>
       <button class="btn btn-dark" id="applyG">تطبيق</button>
     </div>
     <button class="btn btn-pink" id="add">+ منتج</button>
     <button class="btn btn-light" id="reset">تصفير</button>
   </div>
   <div class="products" id="plist"></div>
 </div>

 <div class="summary no-print">
   <h3 style="margin:0 0 8px">الملخص</h3>
   <div class="line"><span>قبل الخصم</span><b id="tb">0 ج.م</b></div>
   <div class="line"><span>خصم المنتجات</span><b id="pd" style="color:#d81b60">- 0 ج.م</b></div>
   <div class="line"><span>خصم عام (<span id="gl">0</span>%)</span><b id="gd" style="color:#d81b60">- 0 ج.م</b></div>
   <hr style="border:none;height:1px;background:#eee">
   <div class="line"><span>الإجمالي</span><span class="total" id="tf">0 ج.م</span></div>
   <label style="margin-top:12px">الدفع</label>
   <select id="pay"><option>كاش</option><option>انستاباي</option><option>فودافون كاش</option><option>بطاقة</option></select>
   <label style="margin-top:8px">ملاحظات</label>
   <textarea id="notes" rows="2"></textarea>
   <div class="actions">
     <button class="btn btn-dark" id="prev">معاينة</button>
     <button class="btn btn-light" id="print">طباعة</button>
     <button class="btn btn-pink" id="pdf">PDF</button>
     <button class="btn btn-green" id="wa">واتساب</button>
   </div>
 </div>
</div>
</div>

<div class="modal" id="modal">
 <div class="paper">
  <div class="paper-hd">
    <div style="display:flex;justify-content:space-between">
      <div><div style="font-size:30px;font-weight:900">mirramor</div><div style="opacity:.9;font-size:12px">mirramorcare - منتجات عناية</div></div>
      <div style="text-align:left"><div style="font-size:12px;opacity:.8">التاريخ</div><div id="m_date" style="font-weight:800;font-size:18px">—</div></div>
    </div>
  </div>
  <div style="padding:22px">
    <div style="margin-bottom:14px"><div style="font-size:11px;color:#777">العميل</div><div id="m_cust" style="font-weight:800;font-size:17px">—</div></div>
    <table><thead><tr><th>#</th><th>المنتج</th><th>سعر</th><th>خصم%</th><th>كمية</th><th>الإجمالي</th></tr></thead><tbody id="m_items"></tbody></table>
    <div style="display:flex;justify-content:flex-end;margin-top:16px"><div style="width:280px">
      <div style="display:flex;justify-content:space-between"><span>المجموع</span><b id="m_tb">0</b></div>
      <div style="display:flex;justify-content:space-between"><span>خصم المنتجات</span><b id="m_pd">0</b></div>
      <div style="display:flex;justify-content:space-between"><span>خصم عام</span><b id="m_gd">0</b></div>
      <hr><div style="display:flex;justify-content:space-between"><span style="font-weight:800">الإجمالي</span><b id="m_tf" style="font-size:20px">0</b></div>
    </div></div>
    <div id="m_notes" style="margin-top:18px;font-size:12px;color:#555"></div>
  </div>
  <div style="background:#fafafa;padding:12px 22px;display:flex;justify-content:space-between;font-size:12px"><span>شكراً لتسوقكم مع mirramorcare</span><span>@mirramorcare</span></div>
 </div>
</div>

<script>
const fmt=n=>new Intl.NumberFormat('en-US').format(Math.round(n||0))+' ج.م';
const $=id=>document.getElementById(id);
let products=[
 {id:1,ar:'سيروم الوجه',en:'Face Serum',price:320,qty:0,pd:50},
 {id:2,ar:'غسول الوجه',en:'Facial Cleanser',price:180,qty:0,pd:50},
 {id:3,ar:'مرطب',en:'Emollient',price:120,qty:0,pd:50},
 {id:4,ar:'صن بلوك',en:'Sun Screen',price:230,qty:0,pd:50},
 {id:5,ar:'سيروم الشعر',en:'Hair Serum',price:240,qty:0,pd:50},
 {id:6,ar:'زيت مساج',en:'Massage Oil',price:50,qty:0,pd:50},
];
const plist=$('plist');
function render(){
 plist.innerHTML='';
 products.forEach(p=>{
  const d=document.createElement('div');d.className='prod';d.dataset.id=p.id;
  d.innerHTML=`<div class="prod-top"><div><div class="pname">${p.ar}</div><div class="pen">${p.en}</div></div><button class="del" data-a="x">✕</button></div>
  <div class="prod-grid">
    <div><div class="small">السعر</div><input type="number" data-f="price" value="${p.price}" min="0"></div>
    <div><div class="small">الكمية</div><div class="qty"><button data-a="-">−</button><input type="number" data-f="qty" value="${p.qty}" min="0"><button data-a="+">+</button></div></div>
    <div><div class="small">خصم%</div><input type="number" data-f="pd" value="${p.pd}" min="0" max="100" style="text-align:center"></div>
  </div>
  <div class="sub" data-s>0</div>`;
  plist.appendChild(d);
 });
 calc();
}

function calc(){
 const gd=0; // global disabled, using per-product only
 $('gl').textContent=0;
 let totalBefore=0, prodDiscTotal=0;
 products.forEach(p=>{
  const base=p.price*p.qty; totalBefore+=base;
  const afterProd=base*(1-(p.pd||0)/100); prodDiscTotal+=(base-afterProd);
  const row=plist.querySelector(`[data-id="${p.id}"]`);
  if(row){ row.querySelector('[data-s]').textContent=fmt(afterProd); }
 });
 const final=totalBefore-prodDiscTotal;
 $('tb').textContent=fmt(totalBefore);
 $('pd').textContent='- '+fmt(prodDiscTotal);
 $('gd').textContent='- '+fmt(0);
 $('tf').textContent=fmt(final);
 save();
}

function save(){localStorage.setItem('mir2',JSON.stringify({cust:$('cust').value,date:$('date').value,gdisc:$('gdisc').value,pay:$('pay').value,notes:$('notes').value,products}))}
function load(){const d=JSON.parse(localStorage.getItem('mir2')||'{}');if(d.products){products=d.products;}else{products.forEach(p=>p.pd=50);}$('cust').value=d.cust||'';$('date').value=d.date||'2026-07-03';$('gdisc').value=d.gdisc!==undefined?d.gdisc:50;$('pay').value=d.pay||'كاش';$('notes').value=d.notes||''}
plist.addEventListener('input',e=>{const r=e.target.closest('.prod');if(!r)return;const p=products.find(x=>x.id==+r.dataset.id);const f=e.target.dataset.f;if(f)p[f]=+e.target.value||0;calc()});
plist.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;const r=b.closest('.prod');const p=products.find(x=>x.id==+r.dataset.id);if(b.dataset.a==='+'){p.qty++;r.querySelector('[data-f="qty"]').value=p.qty}if(b.dataset.a==='-'){p.qty=Math.max(0,p.qty-1);r.querySelector('[data-f="qty"]').value=p.qty}if(b.dataset.a==='x'){products=products.filter(x=>x.id!==p.id);render();return}calc()});
$('applyG').onclick=()=>{const v=Math.min(100,Math.max(0,+$('gdisc').value||0));products.forEach(p=>p.pd=v);render();};
$('reset').onclick=()=>{products.forEach(p=>{p.qty=0;p.pd=50});render()};
$('add').onclick=()=>{products.push({id:Date.now(),ar:'منتج جديد',en:'New',price:0,qty:1,pd:50});render()};
['cust','date','gdisc','pay','notes'].forEach(id=>$(id).addEventListener('input',save));

function fill(){
 $('m_cust').textContent=$('cust').value||'عميل نقدي';
 $('m_date').textContent=$('date').value;
 $('m_tb').textContent=$('tb').textContent; $('m_pd').textContent=$('pd').textContent; $('m_gd').textContent=$('gd').textContent; $('m_tf').textContent=$('tf').textContent;
 $('m_notes').textContent=$('notes').value;
 const tb=$('m_items'); tb.innerHTML=''; const gd=0;
 products.filter(p=>p.qty>0).forEach((p,i)=>{
   const priceAfterPd=p.price*(1-p.pd/100); const sub=priceAfterPd*p.qty;
   tb.innerHTML+=`<tr><td>${i+1}</td><td><b>${p.ar}</b></td><td>${fmt(p.price)}</td><td>${p.pd}%</td><td>${p.qty}</td><td><b>${fmt(sub)}</b></td></tr>`;
 });
}
$('prev').onclick=()=>{fill();$('modal').classList.add('show')};
$('modal').onclick=e=>{if(e.target.id==='modal')$('modal').classList.remove('show')};
$('print').onclick=()=>{fill();$('modal').classList.add('show');setTimeout(()=>print(),300)};
$('pdf').onclick=()=>{fill();$('modal').classList.add('show');setTimeout(()=>print(),300)};
$('wa').onclick=()=>{const its=products.filter(p=>p.qty>0);if(!its.length)return alert('أضف منتجات');let txt=`*mirramor فاتورة*%0Aالعميل: ${$('cust').value||'-'}%0Aالتاريخ: ${$('date').value}%0A`;its.forEach(p=>{txt+=`• ${p.ar} x${p.qty} = ${Math.round(p.price*p.qty*(1-p.pd/100))} ج%0A`});txt+=`الإجمالي: ${$('tf').textContent}`;open('https://wa.me/?text='+txt,'_blank')};
load();render();
// auto-select numbers on click/focus
document.addEventListener('focusin', e=>{
  if(e.target.matches('input[type="number"], input[type="text"], input[type="date"]')){
    setTimeout(()=>e.target.select(),0);
  }
});
document.addEventListener('click', e=>{
  if(e.target.matches('input[type="number"]')) e.target.select();
});

</script>
</body>
</html>
